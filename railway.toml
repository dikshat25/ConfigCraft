[build]
builder = "NIXPACKS"

[deploy]
startCommand = "cd backend && node server.js"
restartPolicyType = "ON_FAILURE"

[phases.setup]
nixPkgs = ["nodejs"]

[phases.install]
cmds = [
  "cd frontend && npm install",
  "cd backend && npm install"
]

[phases.build]
cmds = [
  "cd backend && npx prisma generate",
  "cd frontend && npm run build"
]